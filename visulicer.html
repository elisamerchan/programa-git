<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>MuniTrip 360</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/index.css"
    />

    <style>
      body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial;
      }

      .header {
        padding: 15px;
        background: #1c1c1c;
        border-bottom: 1px solid #333;
      }

      input {
        padding: 10px;
      }

      #viewer {
        width: 100vw;
        height: calc(100vh - 60px);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <div id="viewer"></div>

    <script type="module">
      import { Viewer } from "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core/+esm";

      let viewer = null;

      document.getElementById("fileInput").addEventListener("change", (e) => {
        const file = e.target.files[0];

        if (!file) return;

        const url = URL.createObjectURL(file);

        if (viewer) {
          viewer.destroy();
        }

        viewer = new Viewer({
          container: document.getElementById("viewer"),

          panorama: url,

          defaultYaw: "0deg",

          defaultPitch: "0deg",

          mousewheel: true,

          touchmoveTwoFingers: false,

          navbar: ["zoom", "move", "fullscreen"],
        });
      });
    </script>
  </body>
</html>
